<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Create beautiful CSS gradients instantly. Generate linear and radial gradient code for your website."
    />
    <meta property="og:title" content="Gradient Generator | Vasy.dev" />
    <meta
      property="og:description"
      content="Generate custom gradient backgrounds and copy CSS instantly."
    />
    <meta property="og:image" content="../../images/mason-c-W7Jasy4wBYA-unsplash.webp" />
    <meta property="og:type" content="website" />
    <title>CSS Gradient Generator - Linear & Radial Gradients | Vasy.dev</title>
    <link rel="icon" href="../../favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="../../css/main.css" />
  </head>
  <body class="page page--home page--theme-ocean">
    <main class="site-main">
      <section class="tools section-block section-slice section-slice--a">
        <div class="l-container tools__container">
          <div class="tools__header">
            <h1>Gradient Generator</h1>
            <p>Create linear gradients with live preview and copy CSS output.</p>
            <a href="../index.html" class="button button--secondary">All tools</a>
          </div>

          <section class="gradient-generator" aria-labelledby="gradientGenTitle">
            <div class="gradient-generator__header">
              <h2 id="gradientGenTitle" class="gradient-generator__title">Gradient Controls</h2>
            </div>
            <div class="gradient-generator__layout">
              <div class="gradient-generator__controls">
                <label class="gradient-generator__control"><span>Angle</span><input type="range" id="gradientAngle" min="0" max="360" value="45" /></label>
                <label class="gradient-generator__control gradient-generator__control--color"><span>Color 1</span><input type="color" id="gradientColor1" value="#ff6b6b" /></label>
                <label class="gradient-generator__control gradient-generator__control--color"><span>Color 2</span><input type="color" id="gradientColor2" value="#4ecdc4" /></label>
              </div>
              <div class="gradient-generator__preview-wrap">
                <div id="gradientPreview" class="gradient-generator__preview">Preview</div>
                <code id="gradientCode" class="gradient-generator__code">background: linear-gradient(45deg, #ff6b6b, #4ecdc4);</code>
                <button id="copyGradientBtn" class="button gradient-generator__copy" type="button">Copy CSS</button>
              </div>
            </div>
          </section>
        </div>
      </section>
    </main>
    <script src="../../js/main.js"></script>
  </body>
</html>
