<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Generate CSS text-shadow easily with live preview and copy the CSS code instantly."
    />
    <meta property="og:title" content="CSS Text Shadow Generator | Vasy.dev" />
    <meta
      property="og:description"
      content="Generate CSS text-shadow easily with live preview and copy the CSS code instantly."
    />
    <meta property="og:image" content="../../images/mason-c-W7Jasy4wBYA-unsplash.webp" />
    <meta property="og:type" content="website" />
    <title>CSS Text Shadow Generator | Vasy.dev</title>
    <link rel="icon" href="../../favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="../../css/main.css" />
  </head>
  <body class="page page--home page--theme-ocean">
    <main class="site-main">
      <section class="tools section-block section-slice section-slice--a">
        <div class="l-container tools__container">
          <div class="tools__header">
            <h1>CSS Text Shadow Generator</h1>
            <p>
              Adjust offsets, blur and color to create readable, stylish text
              shadows with instant CSS output.
            </p>
            <a href="../../tools/" class="button button--secondary">All tools</a>
          </div>

          <section class="shadow-generator" aria-labelledby="textShadowGenTitle">
            <div class="shadow-generator__header">
              <h2 id="textShadowGenTitle" class="shadow-generator__title">Text Shadow Controls</h2>
            </div>
            <div class="shadow-generator__layout">
              <div class="shadow-generator__controls">
                <label class="shadow-generator__control">
                  <span>Horizontal</span>
                  <input type="range" id="textShadowX" min="-50" max="50" value="2" />
                </label>
                <label class="shadow-generator__control">
                  <span>Vertical</span>
                  <input type="range" id="textShadowY" min="-50" max="50" value="2" />
                </label>
                <label class="shadow-generator__control">
                  <span>Blur</span>
                  <input type="range" id="textShadowBlur" min="0" max="80" value="5" />
                </label>
                <label class="shadow-generator__control">
                  <span>Color</span>
                  <input type="color" id="textShadowColor" value="#000000" />
                </label>
                <label class="shadow-generator__control">
                  <span>Opacity</span>
                  <input type="range" id="textShadowOpacity" min="0" max="1" step="0.01" value="0.3" />
                </label>
              </div>
              <div class="shadow-generator__preview-wrap">
                <div id="textShadowPreview" class="shadow-generator__preview">Frontend Tools</div>
                <code id="textShadowCode" class="shadow-generator__code">text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.3);</code>
                <button id="copyTextShadowBtn" class="button shadow-generator__copy" type="button">Copy CSS</button>
              </div>
            </div>
          </section>
        </div>
      </section>
    </main>
    <script src="../../js/main.js"></script>
  </body>
</html>
